<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập - Thư viện sách</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="login-page">
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-header">
          <h1 class="login-title">Thư viện sách</h1>
          <p class="login-subtitle">Đăng nhập để tiếp tục</p>
        </div>

        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label for="passwordInput">Mật khẩu</label>
            <input type="text" name="username" autocomplete="username" style="display: none" tabindex="-1" aria-hidden="true" />
            <input
              id="passwordInput"
              class="input"
              type="password"
              placeholder="Nhập mật khẩu..."
              autocomplete="current-password"
              required
            />
          </div>

          <button id="loginBtn" type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
        </form>

        <div id="loginError" class="form-error hidden"></div>
      </div>
    </div>

    <script type="module" src="/login.js"></script>
  </body>
</html>
